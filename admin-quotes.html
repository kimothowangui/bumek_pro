<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Quotes - BUMEK</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/globals.css">
</head>
<body class="font-display antialiased min-h-screen flex flex-col bg-slate-50 overflow-x-hidden">
    <div id="navbar-container"></div>

    <main class="flex-1 max-w-[1280px] mx-auto w-full p-4 md:p-8 py-12 flex flex-col gap-8">
        
        <div class="flex gap-4 border-b border-slate-200 pb-4">
            <a href="/admin.html" class="px-6 py-2 rounded-xl text-sm font-bold bg-white text-slate-600 hover:bg-slate-100 transition-colors border border-slate-200">Overview</a>
            <a href="/admin-quotes.html" class="px-6 py-2 rounded-xl text-sm font-bold bg-slate-900 text-white shadow-lg">Manage Quotes</a>
        </div>

        <!-- Filters & Actions -->
        <div class="flex flex-col md:flex-row justify-between items-center gap-6 bg-white p-4 rounded-2xl border border-slate-200 shadow-sm observe-animate">
            <div id="filter-container" class="flex gap-2 w-full md:w-auto overflow-x-auto no-scrollbar pb-2 md:pb-0">
                <!-- Buttons injected by JS -->
            </div>

            <div class="relative w-full md:w-80">
                <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-base">search</span>
                <input
                    id="search-input"
                    placeholder="Search by client or location..."
                    class="w-full outline-none bg-slate-50 border-none rounded-xl pl-12 pr-4 py-3 text-xs font-bold focus:ring-2 ring-primary/20 transition-all"
                />
            </div>
        </div>

        <!-- Quotes List -->
        <div class="space-y-6" id="quotes-container">
            <div class="p-20 flex flex-col items-center gap-4 text-slate-400">
                <span class="material-symbols-outlined animate-spin text-[32px]">autorenew</span>
                <p class="font-bold uppercase tracking-widest text-xs">Fetching orders...</p>
            </div>
        </div>
    </main>

    <div id="footer-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/supabase-config.js"></script>
    <script src="/js/components.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", async () => {
          let currentFilter = "ALL";
          let allQuotes = [];
          const statusColors = {
              PENDING: "bg-orange-100 text-orange-700 border-orange-200",
              MATCHED: "bg-blue-100 text-blue-700 border-blue-200",
              DELIVERED: "bg-green-100 text-green-700 border-green-200",
              CANCELLED: "bg-red-100 text-red-700 border-red-200",
          };
          
          const filters = ["ALL", "PENDING", "MATCHED", "DELIVERED", "CANCELLED"];
          
          const updateFiltersUI = () => {
              const html = filters.map(s => `
                  <button class="filter-btn px-4 py-2 rounded-xl text-xs font-black uppercase tracking-widest transition-all ${currentFilter === s ? 'bg-slate-900 text-white shadow-lg' : 'text-slate-500 hover:bg-slate-50'}" data-filter="${s}">
                      ${s}
                  </button>
              `).join("");
              document.getElementById("filter-container").innerHTML = html;

              document.querySelectorAll(".filter-btn").forEach(btn => {
                  btn.addEventListener("click", (e) => {
                      currentFilter = e.target.getAttribute("data-filter");
                      fetchData();
                  });
              });
          };

          const updateQuoteStatus = async (id, status) => {
             if(window.BumekService) {
                 await window.BumekService.updateQuoteStatus(id, status);
                 fetchData();
             }
          };

          const renderQuotes = (quotes) => {
              const container = document.getElementById("quotes-container");
              if (!quotes || quotes.length === 0) {
                  container.innerHTML = `
                      <div class="p-20 bg-white rounded-3xl border-2 border-dashed border-slate-100 flex flex-col items-center justify-center text-center">
                          <h3 class="text-2xl font-black mb-2">No active quotes</h3>
                          <p class="text-slate-500 font-bold uppercase tracking-widest text-xs">Requests will appear here as soon as customers submit them.</p>
                      </div>
                  `;
                  return;
              }

              container.innerHTML = quotes.map(quote => `
                  <div class="group bg-white rounded-3xl border border-slate-200 overflow-hidden shadow-sm hover:shadow-xl transition-all duration-300 observe-animate in-view">
                      <div class="p-8 grid grid-cols-1 lg:grid-cols-4 gap-8 items-start">
                          <!-- Client Info -->
                          <div class="flex flex-col gap-6">
                              <div class="flex items-center gap-4">
                                  <div class="w-12 h-12 rounded-2xl bg-primary/5 flex items-center justify-center text-primary">
                                      <span class="material-symbols-outlined text-[24px]">person</span>
                                  </div>
                                  <div>
                                      <h4 class="font-black text-lg tracking-tight">${quote.client_name}</h4>
                                      <p class="text-xs text-slate-400 font-bold uppercase tracking-widest">${new Date(quote.created_at).toLocaleDateString()}</p>
                                  </div>
                              </div>
                              <div class="space-y-1">
                                  <div class="text-slate-500 text-xs font-bold leading-relaxed">${quote.client_email}</div>
                                  <div class="text-slate-500 text-xs font-bold leading-relaxed">${quote.client_phone}</div>
                              </div>
                          </div>

                          <!-- Request Details -->
                          <div class="lg:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-8 bg-slate-50 p-6 rounded-2xl border border-slate-100">
                              <div class="flex flex-col gap-1">
                                  <span class="text-[10px] font-black uppercase tracking-widest text-slate-400">Requesting</span>
                                  <p class="text-lg font-black leading-tight">
                                      ${quote.quantity} ${quote.materials ? quote.materials.unit : "units"} of
                                      <span class="text-primary block">${quote.materials ? quote.materials.name : "Material"}</span>
                                  </p>
                              </div>
                              <div class="flex flex-col gap-1">
                                  <span class="text-[10px] font-black uppercase tracking-widest text-slate-400">Delivery Location</span>
                                  <p class="text-sm font-bold">${quote.location}</p>
                              </div>
                          </div>

                          <!-- Actions -->
                          <div class="flex flex-col gap-4">
                              <div class="px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest border flex items-center justify-center gap-2 ${statusColors[quote.status]}">
                                  <div class="w-2 h-2 rounded-full ${quote.status === 'PENDING' ? 'bg-orange-500 animate-pulse' : 'hidden'}"></div>
                                  ${quote.status}
                              </div>
                              <div class="grid grid-cols-2 gap-2 pt-2 border-t border-slate-100">
                                  <button class="action-btn h-10 rounded-lg bg-blue-50 text-blue-600 text-[10px] font-black uppercase tracking-widest hover:bg-blue-600 hover:text-white transition-all flex items-center justify-center gap-2" data-id="${quote.id}" data-action="MATCHED">
                                      <span class="material-symbols-outlined text-[12px]">check_circle</span> Match
                                  </button>
                                  <button class="action-btn h-10 rounded-lg bg-green-50 text-green-600 text-[10px] font-black uppercase tracking-widest hover:bg-green-600 hover:text-white transition-all flex items-center justify-center gap-2" data-id="${quote.id}" data-action="DELIVERED">
                                      <span class="material-symbols-outlined text-[12px]">check_circle</span> Deliver
                                  </button>
                                  <button class="action-btn h-10 rounded-lg bg-red-50 text-red-600 text-[10px] font-black uppercase tracking-widest hover:bg-red-600 hover:text-white transition-all flex items-center justify-center gap-2" data-id="${quote.id}" data-action="CANCELLED">
                                      <span class="material-symbols-outlined text-[12px]">cancel</span> Cancel
                                  </button>
                                  <button class="h-10 rounded-lg bg-slate-100 text-slate-600 text-[10px] font-black uppercase tracking-widest hover:bg-slate-900 hover:text-white transition-all flex items-center justify-center">
                                      <span class="material-symbols-outlined text-[14px]">more_horiz</span>
                                  </button>
                              </div>
                          </div>
                      </div>
                  </div>
              `).join("");

              document.querySelectorAll(".action-btn").forEach(btn => {
                  btn.addEventListener("click", (e) => {
                      const button = e.target.closest('button');
                      const id = button.getAttribute("data-id");
                      const action = button.getAttribute("data-action");
                      updateQuoteStatus(id, action);
                  });
              });
          };

          const fetchData = async () => {
              updateFiltersUI();
              document.getElementById("quotes-container").innerHTML = `<div class="p-20 flex flex-col items-center gap-4 text-slate-400"><span class="material-symbols-outlined animate-spin text-[32px]">autorenew</span><p class="font-bold uppercase tracking-widest text-xs">Fetching orders...</p></div>`;
              if (window.BumekService) {
                  allQuotes = await window.BumekService.fetchAdminQuotes(currentFilter);
                  renderQuotes(allQuotes);
              }
          };

          document.getElementById('search-input').addEventListener('input', (e) => {
              const query = e.target.value.toLowerCase();
              renderQuotes(allQuotes.filter(q => 
                 q.client_name.toLowerCase().includes(query) || 
                 q.location.toLowerCase().includes(query)
              ));
          });

          // Initial Load
          fetchData();

          // Animation observer
          const observer = new IntersectionObserver((entries) => {
              entries.forEach(e => {
                  if(e.isIntersecting) {
                      e.target.classList.add("in-view");
                  }
              });
          }, { threshold: 0.1 });
          document.querySelectorAll('.observe-animate').forEach(el => observer.observe(el));
      });
    </script>
</body>
</html>
